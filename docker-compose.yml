services:
  web:
    build: .
    container_name: mault-ai-v2
    restart: unless-stopped
    ports:
      - "127.0.0.1:3018:8080"
    networks:
      - mault-v2
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    security_opt:
      - no-new-privileges:true
networks:
  mault-v2:
    name: mault-ai-v2
    driver: bridge
