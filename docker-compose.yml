services:
  web:
    build: .
    container_name: mault-ai-v2
    restart: unless-stopped
    ports:
      - "3017:8080"
    networks:
      - mault-v2
    read_only: true
    cap_drop:
      - ALL
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    security_opt:
      - no-new-privileges:true
networks:
  mault-v2:
    name: mault-ai-v2
    driver: bridge
    ipam:
      config:
        - subnet: 10.211.21.0/24
